<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; }

      /* ── DAG node color cycle: blue(healthy) → red(atrophy) → amber(recover) ── */
      .n1,.n2,.n3,.n4,.n5,.n6 { stroke-width: 1.2; fill: #0d2d6a; stroke: #58a6ff; }

      .n1 { animation: nc 10s ease-in-out infinite; }
      .n2 { animation: nc 10s ease-in-out infinite; animation-delay: -1s; }
      .n3 { animation: nc 10s ease-in-out infinite; animation-delay: -1.5s; }
      .n4 { animation: nc 10s ease-in-out infinite; animation-delay: -2s; }
      .n5 { animation: nc 10s ease-in-out infinite; animation-delay: -2.4s; }
      .n6 { animation: nc 10s ease-in-out infinite; animation-delay: -2.8s; }

      @keyframes nc {
        0%,14%   { fill: #0d2d6a; stroke: #58a6ff; }
        30%,44%  { fill: #6e1116; stroke: #f85149; }
        60%,74%  { fill: #3d2900; stroke: #d29922; }
        88%,100% { fill: #0d2d6a; stroke: #58a6ff; }
      }

      /* ── Overseer core pulse ── */
      .oc {
        fill: #071a07; stroke-width: 1.5; stroke: #238636;
        animation: oca 3s ease-in-out infinite;
      }
      @keyframes oca {
        0%,100% { stroke: #238636; }
        50%     { stroke: #3fb950; filter: drop-shadow(0 0 10px #3fb95055); }
      }

      /* ── Overseer pulse rings ── */
      .pr1,.pr2,.pr3 {
        fill: none; stroke: #3fb950; stroke-width: 1.5; opacity: 0;
        animation: pr 3s ease-out infinite;
      }
      .pr2 { animation-delay: -1s; }
      .pr3 { animation-delay: -2s; }
      @keyframes pr {
        0%   { r: 20; opacity: 0.7; }
        100% { r: 56; opacity: 0; }
      }

      /* ── Scan arm rotation ── */
      .sa { transform-origin: 0 0; animation: sarot 5s linear infinite; }
      @keyframes sarot { to { transform: rotate(360deg); } }

      /* ── Signal flow arrows ── */
      .sf-b {
        stroke: #1f6feb; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none;
        animation: sf .9s linear infinite;
      }
      .sf-g {
        stroke: #2ea043; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none;
        animation: sf .9s linear infinite;
      }
      @keyframes sf { from { stroke-dashoffset: 7; } to { stroke-dashoffset: 0; } }

      /* ── Prompt panel: three states swap in/out in sync with node cycle ── */
      .pv-a { animation: pva 10s ease-in-out infinite; }
      @keyframes pva {
        0%,22%   { opacity: 1; }
        30%,72%  { opacity: 0; }
        80%,100% { opacity: 1; }
      }
      .pv-d { animation: pvd 10s ease-in-out infinite; opacity: 0; }
      @keyframes pvd {
        0%,28%  { opacity: 0; }
        35%,47% { opacity: 1; }
        55%,100%{ opacity: 0; }
      }
      .pv-p { animation: pvp 10s ease-in-out infinite; opacity: 0; }
      @keyframes pvp {
        0%,60%  { opacity: 0; }
        67%,76% { opacity: 1; }
        84%,100%{ opacity: 0; }
      }
    </style>

    <!-- Arrow markers -->
    <marker id="ea" viewBox="0 0 8 8" refX="7" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 1.5L7 4L1 6.5" fill="none" stroke="#30363d"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 8 8" refX="7" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 1.5L7 4L1 6.5" fill="none" stroke="#1f6feb"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 8 8" refX="7" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 1.5L7 4L1 6.5" fill="none" stroke="#2ea043"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="820" height="200" rx="12" fill="#0d1117"/>
  <rect x=".5" y=".5" width="819" height="199" rx="11.5"
        fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- ── Section dividers ── -->
  <line x1="268" y1="18" x2="268" y2="188" stroke="#21262d" stroke-width="1"/>
  <line x1="556" y1="18" x2="556" y2="188" stroke="#21262d" stroke-width="1"/>

  <!-- ── Section labels ── -->
  <text x="134" y="13" text-anchor="middle" font-size="8" letter-spacing="1.5"
        font-weight="600" fill="#484f58" font-family="monospace">PREREQUISITE SKILL GRAPH</text>
  <text x="412" y="13" text-anchor="middle" font-size="8" letter-spacing="1.5"
        font-weight="600" fill="#484f58" font-family="monospace">OVERSEER AGENT</text>
  <text x="688" y="13" text-anchor="middle" font-size="8" letter-spacing="1.5"
        font-weight="600" fill="#484f58" font-family="monospace">PROMPT MODIFICATION</text>

  <!-- ══════════════ SECTION 1: DAG ══════════════ -->

  <!-- Edges (drawn first, nodes render on top) -->
  <line x1="134" y1="67" x2="82"  y2="97"  stroke="#21262d" stroke-width="1" fill="none" marker-end="url(#ea)"/>
  <line x1="134" y1="67" x2="190" y2="97"  stroke="#21262d" stroke-width="1" fill="none" marker-end="url(#ea)"/>
  <line x1="82"  y1="119" x2="50" y2="150" stroke="#21262d" stroke-width="1" fill="none" marker-end="url(#ea)"/>
  <line x1="82"  y1="119" x2="134" y2="150" stroke="#21262d" stroke-width="1" fill="none" marker-end="url(#ea)"/>
  <line x1="190" y1="119" x2="134" y2="150" stroke="#21262d" stroke-width="1" fill="none" marker-end="url(#ea)"/>
  <line x1="190" y1="119" x2="218" y2="150" stroke="#21262d" stroke-width="1" fill="none" marker-end="url(#ea)"/>

  <!-- Nodes -->
  <rect class="n1" x="107" y="45"  width="54" height="22" rx="5"/>
  <text x="134" y="59"  text-anchor="middle" font-size="8.5" fill="#e6edf3">Arithmetic</text>

  <rect class="n2" x="47"  y="97"  width="70" height="22" rx="5"/>
  <text x="82"  y="111" text-anchor="middle" font-size="8.5" fill="#e6edf3">Probability</text>

  <rect class="n3" x="155" y="97"  width="70" height="22" rx="5"/>
  <text x="190" y="111" text-anchor="middle" font-size="8.5" fill="#e6edf3">Lin. Algebra</text>

  <rect class="n4" x="20"  y="150" width="60" height="22" rx="5"/>
  <text x="50"  y="164" text-anchor="middle" font-size="8"   fill="#e6edf3">Markov</text>

  <rect class="n5" x="107" y="150" width="54" height="22" rx="5"/>
  <text x="134" y="164" text-anchor="middle" font-size="8"   fill="#e6edf3">Optim.</text>

  <rect class="n6" x="192" y="150" width="60" height="22" rx="5"/>
  <text x="222" y="164" text-anchor="middle" font-size="8"   fill="#e6edf3">Neural</text>

  <text x="134" y="190" text-anchor="middle" font-size="7" fill="#484f58"
        font-style="italic">capability ĉᵥ · prerequisite cascade</text>

  <!-- ── Signal: DAG → Overseer ── -->
  <line x1="270" y1="103" x2="374" y2="103" class="sf-b" marker-end="url(#ab)"/>
  <text x="322" y="96" text-anchor="middle" font-size="7.5" fill="#1f6feb">observations</text>

  <!-- ══════════════ SECTION 2: OVERSEER AGENT ══════════════ -->

  <!-- Pulse rings -->
  <circle class="pr1" cx="412" cy="103" r="20"/>
  <circle class="pr2" cx="412" cy="103" r="20"/>
  <circle class="pr3" cx="412" cy="103" r="20"/>

  <!-- Core circle -->
  <circle class="oc" cx="412" cy="103" r="36"/>

  <!-- Scan arm (translated so rotation pivot = circle center) -->
  <g transform="translate(412,103)">
    <g class="sa">
      <line x1="0" y1="0" x2="0" y2="-33" stroke="#3fb950"
            stroke-width="1" opacity="0.5"/>
      <circle cx="0" cy="-30" r="2.5" fill="#3fb950" opacity="0.8"/>
    </g>
  </g>

  <!-- Center dot -->
  <circle cx="412" cy="103" r="4" fill="#3fb950"/>

  <!-- Labels -->
  <text x="412" y="153" text-anchor="middle" font-size="9"
        fill="#e6edf3" font-weight="500">Overseer Agent</text>
  <text x="412" y="165" text-anchor="middle" font-size="7.5" fill="#8b949e">
    Persistent Cognitive State</text>
  <text x="412" y="175" text-anchor="middle" font-size="7.5" fill="#8b949e">
    Approximation Tracking</text>
  <text x="412" y="188" text-anchor="middle" font-size="7" fill="#484f58"
        font-style="italic">EKF · Bayesian state estimate</text>

  <!-- ── Signal: Overseer → Prompt ── -->
  <line x1="450" y1="103" x2="554" y2="103" class="sf-g" marker-end="url(#ag)"/>
  <text x="502" y="96" text-anchor="middle" font-size="7.5" fill="#2ea043">deterrent u_v</text>

  <!-- ══════════════ SECTION 3: PROMPT MODIFICATION ══════════════ -->

  <!-- Document shell -->
  <rect x="572" y="22" width="232" height="160" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="572" y="22" width="232" height="20" rx="8" fill="#21262d"/>
  <rect x="572" y="35"  width="232" height="7"  fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="586" cy="32" r="3.5" fill="#f85149" opacity="0.7"/>
  <circle cx="598" cy="32" r="3.5" fill="#d29922" opacity="0.7"/>
  <circle cx="610" cy="32" r="3.5" fill="#3fb950" opacity="0.7"/>
  <text x="688" y="36" text-anchor="middle" font-size="7.5"
        fill="#8b949e" font-family="monospace">system_prompt.txt</text>

  <!-- State: full assist (green) -->
  <g class="pv-a">
    <text x="585" y="60" font-size="7.5" fill="#3fb950" font-family="monospace">● mode: full_assist</text>
    <rect x="585" y="65"  width="130" height="5" rx="2" fill="#238636" opacity=".80"/>
    <rect x="585" y="74"  width="100" height="5" rx="2" fill="#238636" opacity=".60"/>
    <rect x="585" y="83"  width="148" height="5" rx="2" fill="#238636" opacity=".45"/>
    <rect x="585" y="92"  width="82"  height="5" rx="2" fill="#238636" opacity=".35"/>
    <rect x="585" y="101" width="118" height="5" rx="2" fill="#238636" opacity=".25"/>
    <rect x="585" y="110" width="95"  height="5" rx="2" fill="#238636" opacity=".18"/>
    <text x="585" y="136" font-size="7.5" fill="#3fb950" font-family="monospace" opacity=".8">→ complete solution</text>
    <text x="585" y="147" font-size="7.5" fill="#3fb950" font-family="monospace" opacity=".4">→ step-by-step output</text>
  </g>

  <!-- State: full deferral (red) -->
  <g class="pv-d">
    <text x="585" y="60" font-size="7.5" fill="#f85149" font-family="monospace">● mode: full_deferral</text>
    <rect x="585" y="65"  width="115" height="5" rx="2" fill="#da3633" opacity=".80"/>
    <rect x="585" y="74"  width="88"  height="5" rx="2" fill="#da3633" opacity=".60"/>
    <rect x="585" y="83"  width="138" height="5" rx="2" fill="#da3633" opacity=".45"/>
    <rect x="585" y="92"  width="70"  height="5" rx="2" fill="#da3633" opacity=".35"/>
    <rect x="585" y="101" width="125" height="5" rx="2" fill="#da3633" opacity=".25"/>
    <rect x="585" y="110" width="104" height="5" rx="2" fill="#da3633" opacity=".18"/>
    <text x="585" y="136" font-size="7.5" fill="#f85149" font-family="monospace" opacity=".8">→ teach prerequisites</text>
    <text x="585" y="147" font-size="7.5" fill="#f85149" font-family="monospace" opacity=".4">→ withhold answer</text>
  </g>

  <!-- State: partial help (amber) -->
  <g class="pv-p">
    <text x="585" y="60" font-size="7.5" fill="#d29922" font-family="monospace">● mode: partial_help</text>
    <rect x="585" y="65"  width="122" height="5" rx="2" fill="#b08800" opacity=".80"/>
    <rect x="585" y="74"  width="145" height="5" rx="2" fill="#b08800" opacity=".60"/>
    <rect x="585" y="83"  width="88"  height="5" rx="2" fill="#b08800" opacity=".45"/>
    <rect x="585" y="92"  width="110" height="5" rx="2" fill="#b08800" opacity=".35"/>
    <rect x="585" y="101" width="78"  height="5" rx="2" fill="#b08800" opacity=".25"/>
    <rect x="585" y="110" width="134" height="5" rx="2" fill="#b08800" opacity=".18"/>
    <text x="585" y="136" font-size="7.5" fill="#d29922" font-family="monospace" opacity=".8">→ first step only</text>
    <text x="585" y="147" font-size="7.5" fill="#d29922" font-family="monospace" opacity=".4">→ Socratic guidance</text>
  </g>

  <text x="688" y="190" text-anchor="middle" font-size="7" fill="#484f58"
        font-style="italic">Gemini 2.5 Flash · modulated via u_v ∈ [0,1]</text>
</svg>
