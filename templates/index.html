<!doctype html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <title>APAI Gemini Web Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fb;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            min-width: 600px;
            width: 90vw;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px 28px;
            box-sizing: border-box;
            overflow-x: auto;
        }
        h1 {
            color: #1f77b4;
            margin-bottom: 18px;
        }
        form {
            margin-bottom: 24px;
        }
        textarea {
            width: 100%;
            border-radius: 6px;
            border: 1px solid #d0d7de;
            padding: 10px;
            font-size: 1.1em;
            margin-bottom: 10px;
            resize: vertical;
        }
        input[type="submit"] {
            background: #1f77b4;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 18px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        input[type="submit"]:hover {
            background: #174a7a;
        }
        .chat-history {
            margin-top: 24px;
            width: 100%;
            max-width: 100%;
        }
        .chat-entry {
            background: #e9f1fa;
            border-radius: 8px;
            margin-bottom: 14px;
            padding: 12px 16px;
            box-shadow: 0 1px 4px rgba(31,119,180,0.07);
            width: 100%;
            max-width: 100%;
            word-break: break-word;
            overflow-wrap: break-word;
            box-sizing: border-box;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        .chat-q {
            color: #2ca02c;
            margin-bottom: 6px;
        }
        .chat-a {
            color: #d62728;
        }
        .response-block {
            background: #fffbe6;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 18px;
            box-shadow: 0 1px 4px rgba(255,193,7,0.07);
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            white-space: pre-wrap;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class='container'>
        <h1>APAI Gemini Chatbot</h1>
        <form id='chat-form'>
            <textarea id='user_query' name='user_query' rows='4' placeholder='Enter your question here'></textarea><br>
            <input type='submit' value='Ask'>
        </form>
        <div id='response-block'></div>
        <div id='history-block'></div>
    </div>
    <script src="/static/chat.js"></script>
</body>
</html>
